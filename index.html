<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Classify</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0f172a;
color:white;
overflow-x:hidden;
}

/* background glow */

body::before{
content:"";
position:fixed;
top:-200px;
left:-200px;
width:500px;
height:500px;
background:radial-gradient(circle,#6366f1,transparent);
opacity:.25;
filter:blur(120px);
z-index:-1;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 8%;
background:#020617;
border-bottom:1px solid #1e293b;
position:relative;
}

.logo{
font-size:22px;
font-weight:600;
color:#6366f1;
}

.nav-right{
display:flex;
align-items:center;
gap:25px;
}

nav{
display:flex;
gap:25px;
}

nav a{
text-decoration:none;
color:#cbd5f5;
font-size:14px;
transition:.3s;
}

nav a:hover{
color:white;
}

/* SHARE BUTTON */

.share-btn{
background:#6366f1;
border:none;
padding:8px 16px;
border-radius:6px;
color:white;
cursor:pointer;
transition:.3s;
}

.share-btn:hover{
background:#4f46e5;
transform:translateY(-2px);
box-shadow:0 6px 20px rgba(99,102,241,.5);
}

/* MOBILE BUTTON */

.menu-btn{
display:none;
font-size:24px;
cursor:pointer;
}

/* HERO */

.hero{
text-align:center;
padding:120px 20px;
max-width:900px;
margin:auto;
animation:fadeUp 1s ease forwards;
opacity:0;
}

/* gradient title */

.hero h1{
font-size:48px;
margin-bottom:20px;
background:linear-gradient(90deg,#6366f1,#22c55e);
-webkit-background-clip:text;
color:transparent;
}

.hero p{
color:#94a3b8;
margin-bottom:35px;
font-size:18px;
}

/* SEARCH BOX */

.search-box{
background:#020617;
padding:28px;
border-radius:12px;
border:1px solid #1e293b;
display:flex;
gap:12px;
justify-content:center;
flex-wrap:wrap;
max-width:620px;
margin:auto;
animation:fadeUp 1.3s ease forwards;
opacity:0;
}

select,input{
padding:12px;
border-radius:6px;
border:1px solid #334155;
background:#0f172a;
color:white;
min-width:150px;
}

.search-btn{
background:#6366f1;
}

.search-btn:hover{
background:#4f46e5;
transform:translateY(-2px);
}

/* CTA */

.cta{
text-align:center;
padding:100px 20px;
background:#020617;
margin-top:60px;
border-top:1px solid #1e293b;
animation:fadeUp 1.6s ease forwards;
opacity:0;
}

.cta h2{
margin-bottom:12px;
}

.cta p{
color:#94a3b8;
margin-bottom:20px;
}

.cta button{
background:#10b981;
}

.cta button:hover{
background:#059669;
transform:translateY(-2px);
}

/* FOOTER */

footer{
text-align:center;
padding:40px;
color:#94a3b8;
}

/* ANIMATION */

@keyframes fadeUp{
to{
opacity:1;
transform:translateY(0);
}
from{
transform:translateY(30px);
}
}

/* MOBILE */

@media(max-width:768px){

nav{
position:absolute;
top:65px;
right:20px;
width:210px;
background:#020617;
flex-direction:column;
display:none;
padding:20px;
border-radius:10px;
border:1px solid #1e293b;
box-shadow:0 10px 25px rgba(0,0,0,.6);
}

nav a{
padding:8px 0;
}

nav.show{
display:flex;
}

.menu-btn{
display:block;
}

.share-btn{
display:none;
}

.mobile-share{
display:block;
margin-top:10px;
}

.hero h1{
font-size:32px;
}

.search-box{
flex-direction:column;
}

.search-box select,
.search-box input,
.search-box button{
width:100%;
}

}

</style>

</head>

<body>

<header>

<div class="logo">Classify</div>

<div class="nav-right">

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<nav id="navMenu">

<a href="#">Home</a>
<a href="#">Institutes</a>
<a href="#">For Institutes</a>
<a href="#">Contact</a>

<button onclick="shareSite()" class="share-btn mobile-share">Share</button>

</nav>

<button onclick="shareSite()" class="share-btn">Share</button>

</div>

</header>



<section class="hero">

<h1>Find the Right Coaching Institute</h1>

<p>
Search and compare coaching institutes for exams like JEE and NEET.
</p>

<div class="search-box">

<select>
<option>Select Exam</option>
<option>JEE</option>
<option>NEET</option>
<option>CUET</option>
</select>

<input type="text" placeholder="Enter your city">

<button class="search-btn">Search</button>

</div>

</section>



<section class="cta">

<h2>Own a Coaching Institute?</h2>

<p>List your institute on Classify and reach students searching for coaching.</p>

<button>Register Institute</button>

</section>



<footer>

<p>© 2026 Classify</p>

</footer>



<script>

function toggleMenu(){
document.getElementById("navMenu").classList.toggle("show");
}

function shareSite(){

if(navigator.share){
navigator.share({
title:"Classify",
text:"Find coaching institutes easily",
url:window.location.href
});
}else{
navigator.clipboard.writeText(window.location.href);
alert("Link copied");
}

}

</script>

</body>
</html>

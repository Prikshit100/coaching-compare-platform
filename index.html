<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Classify | Find Coaching Institutes</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 40px;
border-bottom:1px solid #1e293b;
position:relative;
}

.logo{
font-size:30px;
font-weight:700;
background:linear-gradient(90deg,#6366f1,#a855f7);
-webkit-background-clip:text;
color:transparent;
}

nav{
display:flex;
gap:30px;
align-items:center;
}

nav a{
text-decoration:none;
color:#cbd5f5;
font-size:15px;
}

nav a:hover{
color:white;
}

.share-btn{
background:linear-gradient(90deg,#6366f1,#a855f7);
border:none;
padding:8px 18px;
border-radius:8px;
color:white;
cursor:pointer;
font-size:14px;
}

/* MENU BUTTON */

.menu-btn{
display:none;
font-size:26px;
cursor:pointer;
}

/* HERO */

.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:44px;
margin-bottom:20px;
background:linear-gradient(90deg,#6366f1,#a855f7);
-webkit-background-clip:text;
color:transparent;
}

.hero p{
color:#94a3b8;
margin-bottom:40px;
font-size:18px;
}

/* SEARCH BOX */

.search-box{
background:#020617;
border:1px solid #1e293b;
padding:30px;
border-radius:14px;

display:flex;
flex-wrap:wrap;
gap:15px;
justify-content:center;

max-width:650px;
margin:auto;
}

.search-box select,
.search-box input{

padding:12px;
border-radius:8px;
border:1px solid #334155;

background:#0f172a;
color:white;

flex:1;
min-width:160px;
}

.search-btn{

background:linear-gradient(90deg,#6366f1,#a855f7);
border:none;
padding:12px 25px;
border-radius:8px;
color:white;
cursor:pointer;

}

/* MOBILE */

@media(max-width:768px){

header{
padding:18px 20px;
}

.menu-btn{
display:block;
}

/* NAV DROPDOWN */

nav{
position:absolute;

top:65px;
right:20px;

background:#020617;
border:1px solid #1e293b;

border-radius:10px;

padding:18px;

flex-direction:column;
align-items:flex-start;
gap:14px;

display:none;

width:200px;

box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

nav.show{
display:flex;
}

nav a{
font-size:14px;
}

.share-btn{
width:100%;
text-align:center;
}

/* HERO TEXT */

.hero h1{
font-size:30px;
}

.hero p{
font-size:15px;
}

/* SEARCH */

.search-box{
flex-direction:column;
}

}

</style>

</head>
<body>


<header>

<div class="logo">Classify</div>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<nav id="navMenu">

<a href="#">Home</a>
<a href="#">Institutes</a>
<a href="#">For Institutes</a>
<a href="#">Contact</a>

<button class="share-btn" onclick="shareSite()">Share</button>

</nav>

</header>


<section class="hero">

<h1>Find the Right Coaching Institute</h1>

<p>Search and discover coaching institutes for national level exams.</p>


<div class="search-box">

<select>

<option>Select Exam</option>
<option>JEE</option>
<option>NEET</option>
<option>NDA</option>
<option>CUET</option>

</select>

<input type="text" placeholder="Enter your city">

<button class="search-btn">Search</button>

</div>

</section>


<script>

function toggleMenu(){

document.getElementById("navMenu").classList.toggle("show");

}

function shareSite(){

if(navigator.share){

navigator.share({
title:"Classify",
text:"Find the best coaching institutes",
url:window.location.href
});

}else{

navigator.clipboard.writeText(window.location.href);
alert("Link copied");

}

}

</script>


</body>
</html>
